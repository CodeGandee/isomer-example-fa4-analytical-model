[workspace]
authors = ["<GITHUB_USER> <developer@example.com>"]
channels = ["conda-forge"]
name = "flash-attention-4-whitebox-runtime-model"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
test = "PYTHONPATH=repos/topic-main/src python -c 'import fa4_b200_predictor; print(\"smoke test passed\")'"

[dependencies]
python = "3.11.*"
pip = ">=26.1.2,<27"

[pypi-dependencies]
numpy = ">=2.4.6, <3"
sympy = ">=1.14.0, <2"
scipy = ">=1.17.1, <2"
markdown = ">=3.10.2, <4"
mdutils = ">=1.8.1, <2"
ruff = ">=0.15.20, <0.16"
mkdocs-material = ">=9.7.6, <10"
mypy = ">=2.1.0, <3"
attrs = ">=26.1.0, <27"
omegaconf = ">=2.3.1, <3"
imageio = ">=2.37.3, <3"
matplotlib = ">=3.11.0, <4"
jsonschema = ">=4.26.0, <5"
jinja2 = ">=3.1.6, <4"
